version: 2

updates:
  # npm-Dependencies (Production + Dev)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Zurich
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      prefix-development: deps-dev
    groups:
      # Patch/Minor-Updates gebündelt in einem PR, um Rauschen zu reduzieren.
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub-Actions-Versionen (z. B. actions/checkout, setup-node)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Zurich
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci

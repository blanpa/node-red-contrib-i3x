name: Bug report
description: Report a problem with the i3X nodes
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include a minimal flow export (JSON) if possible.
      render: json
    validations:
      required: false
  - type: input
    id: package-version
    attributes:
      label: node-red-contrib-i3x version
      placeholder: e.g. 0.0.6
    validations:
      required: true
  - type: input
    id: node-red-version
    attributes:
      label: Node-RED / Node.js version
      placeholder: e.g. Node-RED 4.1.11, Node.js 20
    validations:
      required: true
  - type: input
    id: server
    attributes:
      label: i3X server / spec version
      placeholder: e.g. CESMII demo, spec 1.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
    validations:
      required: false

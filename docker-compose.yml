services:
  test:
    build: .
    command: npm test
    environment:
      - I3X_BASE_URL=https://i3x.cesmii.net

  test-unit:
    build: .
    command: npm run test:unit

  test-integration:
    build: .
    command: npm run test:integration
    environment:
      - I3X_BASE_URL=https://i3x.cesmii.net

  node-red:
    image: nodered/node-red:latest
    ports:
      - "18880:1880"
    volumes:
      - .:/app/node-red-contrib-i3x:ro
      - node-red-data:/data
    environment:
      - NODE_RED_CREDENTIAL_SECRET=testsecret
    entrypoint: >
      sh -c "cd /usr/src/node-red && npm install /app/node-red-contrib-i3x && cp -f /app/node-red-contrib-i3x/examples/i3x-complete-demo.json /data/flows.json && node-red --userDir /data"

  # ── Bundled i3X reference mock server (1.0 Release) ──────────────────
  i3x-mock:
    image: node:18-alpine
    working_dir: /srv
    command: node server.js
    volumes:
      - ./mock-server:/srv:ro
    environment:
      - PORT=8080
      # set I3X_STREAM=off to make the mock advertise poll-only (SSE → 501)
      - I3X_STREAM=on
    ports:
      - "18810:8080"

  # Official i3X Explorer GUI (ACE Technologies / CESMII), built as a static
  # nginx site and pointed at the bundled mock. Browser → http://localhost:18820
  # (the Explorer is a client-side SPA, so it talks to the mock at
  # http://localhost:18810/v1 directly from your browser; CORS is enabled on the mock).
  i3x-explorer:
    build:
      context: ./i3x-explorer
    depends_on:
      - i3x-mock
    ports:
      - "18820:80"

  # Node-RED wired to the bundled mock (demo flow points at http://i3x-mock:8080)
  node-red-mock:
    image: nodered/node-red:latest
    depends_on:
      - i3x-mock
    ports:
      - "18881:1880"
    volumes:
      - .:/app/node-red-contrib-i3x:ro
      - node-red-mock-data:/data
    environment:
      - NODE_RED_CREDENTIAL_SECRET=testsecret
    entrypoint: >
      sh -c "cd /usr/src/node-red && npm install /app/node-red-contrib-i3x && cp -f /app/node-red-contrib-i3x/examples/i3x-mock-demo.json /data/flows.json && node-red --userDir /data"

volumes:
  node-red-data:
  node-red-mock-data:

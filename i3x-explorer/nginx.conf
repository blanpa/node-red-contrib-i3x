server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # config.json must never be cached, so a redeploy / first-visit picks up
    # the correct default server URL.
    location = /config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Single-page app: route everything else to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
